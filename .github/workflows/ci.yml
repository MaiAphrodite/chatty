name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          
      - name: Install dependencies
        run: bun install
        
      - name: Type check (API)
        run: cd apps/api && bunx tsc --noEmit
        
      - name: Type check (Web)
        run: cd apps/web && bunx tsc --noEmit
        
      - name: Build Web
        run: cd apps/web && bun run build

  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/maiaphrodite/chatty:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to Remote Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Pulling latest changes and restarting..."
            mkdir -p ~/chatty
            cd ~/chatty
            
            # Create or update docker-compose.yml on the server
            cat > docker-compose.yml << 'EOF'
            services:
              api:
                image: ghcr.io/maiaphrodite/chatty:latest
                ports:
                  - "3000:3000"
                  - "4000:4000"
                  - "4001:4001"
                environment:
                  - DATABASE_URL=${DATABASE_URL}
                  - JWT_SECRET=${JWT_SECRET}
                  - LLM_BASE_URL=${LLM_BASE_URL}
                depends_on:
                  - db
                  
              db:
                image: postgres:16-alpine
                restart: always
                environment:
                  - POSTGRES_USER=chatty
                  - POSTGRES_PASSWORD=chatty
                  - POSTGRES_DB=chatty
                ports:
                  - "5432:5432"
                volumes:
                  - pgdata:/var/lib/postgresql/data
            volumes:
              pgdata:
            EOF
            
            # Pull latest image and restart
            docker compose pull api
            docker compose up -d --remove-orphans
            
            # Apply database migrations (non-interactive, idempotent)
            docker compose exec -T api bun run db:deploy

