[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log

[program:api]
command=bun apps/api/src/index.ts
directory=/app
autostart=true
autorestart=true
startsecs=5
startretries=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:web]
command=bun apps/web/node_modules/.bin/next start -p 3000
directory=/app
autostart=true
autorestart=true
startsecs=5
startretries=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
