[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log

[program:postgresql]
command=/usr/lib/postgresql/%(ENV_PG_MAJOR)s/bin/postgres -D /var/lib/postgresql/%(ENV_PG_MAJOR)s/main -c config_file=/etc/postgresql/%(ENV_PG_MAJOR)s/main/postgresql.conf
user=postgres
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:api]
command=bun apps/api/src/index.ts
directory=/app
environment=DATABASE_URL="postgres://chatty:chatty@localhost:5432/chatty"
autostart=true
autorestart=true
startsecs=5
startretries=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:web]
command=bun apps/web/node_modules/.bin/next start -p 3000
directory=/app
autostart=true
autorestart=true
startsecs=5
startretries=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
